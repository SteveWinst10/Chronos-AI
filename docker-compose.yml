services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      NEO4J_URI: ${NEO4J_URI:-bolt://neo4j:7687}
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-password}
      VECTOR_DB_URL: ${VECTOR_DB_URL:-file:///home/steve/Projects/Chronos-AI/memories.lance}
      DATABASE_URL: ${DATABASE_URL:-postgresql://chronos:chronos@host.docker.internal:5432/chronos}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      NEWS_API_KEY: ${NEWS_API_KEY:-}
    volumes:
      - ./backend:/backend
      - ./memories.lance:/data/memories.lance
    networks:
      - knowledge-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    volumes:
      - ./frontend:/frontend
      - /frontend/node_modules
    networks:
      - knowledge-network
  neo4j:
    image: neo4j:5
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/password
    volumes:
      - neo4j_data:/data

networks:
  knowledge-network:
    driver: bridge
volumes:
  neo4j_data:
