services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      NEO4J_URI: ${NEO4J_URI:-bolt://host.docker.internal:7687}
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-password}
      VECTOR_DB_URL: ${VECTOR_DB_URL:-http://host.docker.internal:6333}
      DATABASE_URL: ${DATABASE_URL:-postgresql://chronos:chronos@host.docker.internal:5432/chronos}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      NEWS_API_KEY: ${NEWS_API_KEY:-}
    volumes:
      - ./backend:/backend
    networks:
      - knowledge-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/frontend
      - /frontend/node_modules
    networks:
      - knowledge-network

networks:
  knowledge-network:
    driver: bridge
